# ── HSTS 映射（在 server 块之外定义）──────────────────
# 当反向代理通过 X-Forwarded-Proto 告知 HTTPS 时，启用 HSTS
map $http_x_forwarded_proto $hsts_header {
    https   "max-age=31536000; includeSubDomains; preload";
    default "";
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── 安全响应头 ─────────────────────────────────────
    # 防止浏览器 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;
    # 防止点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;
    # 控制 Referrer 信息发送策略
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 限制浏览器功能权限
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS：仅在反向代理为 HTTPS 时生效（由上方 map 控制）
    add_header Strict-Transport-Security $hsts_header always;

    # ── 反向代理（Dokploy / Traefik）支持 ──────────────
    # 信任反向代理传递的真实客户端 IP（仅用于日志记录，非访问控制）
    # 覆盖所有 RFC 1918 私有网段，兼容不同 Docker 网络配置
    real_ip_header X-Forwarded-For;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;

    # ── 健康检查（供 Traefik / Docker HEALTHCHECK 使用）───
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ── SPA 路由 ───────────────────────────────────────
    # 尝试访问请求的文件或目录，如果找不到则回退到 index.html
    # 这样可以防止单页应用在刷新时出现 404 错误
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 静态资源缓存 ──────────────────────────────────
    # 注意：nginx 的 add_header 不会从 server 级别继承到含有自身 add_header 的 location
    # 因此需要在此处重复所有安全头
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security $hsts_header always;
    }
}