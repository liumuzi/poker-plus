server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 启用 gzip 压缩 — 大幅减少首次加载传输体积
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # 尝试访问请求的文件或目录，如果找不到则回退到 index.html
    # 这样可以防止单页应用在刷新时出现 404 错误
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 缓存静态资源以提高性能（Vite 产出的文件名含 hash，可长期缓存）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}