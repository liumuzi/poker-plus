server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff
        font/woff2;

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # env-config.js 是运行时配置，绝对不能缓存
    location = /env-config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # 带 hash 的静态资源（JS/CSS chunk）永久缓存
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 图片/字体长期缓存
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        access_log off;
    }

    # index.html 不缓存，确保更新后用户能拿到最新版
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Supabase API 反向代理（运行时由 docker-entrypoint.sh 生成）
    # 解决中国用户直连 Supabase 被 GFW 封锁/限速导致请求超时的问题
    include /etc/nginx/supabase-proxy.conf;
}
